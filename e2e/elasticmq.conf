include classpath("application.conf")

# Queue URL will use this; set so host can reach (localhost when app runs on host)
node-address {
  protocol = http
  host = localhost
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
}

rest-stats {
  enabled = true
  bind-port = 9325
  bind-hostname = "0.0.0.0"
}

aws {
  region = us-east-1
  accountId = 000000000000
}

queues {
  video-backup-queue { }
}
