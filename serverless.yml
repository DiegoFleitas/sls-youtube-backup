service: sls-youtube-backup

frameworkVersion: "3"

provider:
  # use dev if no stage is specified
  stage: ${opt:stage, self:custom.defaultStage}
  region: us-east-1
  name: aws
  runtime: nodejs20.x
  apiGateway:
    minimumCompressionSize: 1024
    shouldStartNameWithService: true
  environment:
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"
    REGION: ${self:provider.region}
    SERVICE_NAME: ${self:service}
    STAGE: ${self:provider.stage}
  lambdaHashingVersion: "20201221"
  versionFunctions: true

plugins:
  - serverless-esbuild
  - serverless-offline
  - serverless-dotenv-plugin
  - serverless-lift

custom:
  defaultStage: dev
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    target: node20
    define: {}
    platform: node

package:
  individually: true

constructs:
  video-backup-queue:
    type: queue
    # Reference an existing function by name — Lift adds the SQS event source mapping.
    worker: backupVideos
    batchSize: 10
    extensions:
      queue:
        Properties:
          VisibilityTimeout: 120
      # Customise Lift's auto-created DLQ instead of adding a second resource.
      dlq:
        Properties:
          MessageRetentionPeriod: 1209600

functions:
  queuePlaylistBackup:
    handler: src/functions/queuePlaylistBackup/handler.main
    environment:
      SQS_QUEUE_URL: ${construct:video-backup-queue.queueUrl}
    memorySize: 128 # MB
    timeout: 5 # seconds
    events:
      - http:
          path: queuePlaylistBackup
          method: POST
          cors: true

  backupVideos:
    handler: src/functions/backupVideos/handler.main
    memorySize: 128 # MB
    timeout: 60 # seconds
